name: fashionstore
description: App bán quần áo Flutter + Firebase
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.3
  get: ^4.6.6
  google_sign_in: ^6.2.1
  cached_network_image: ^3.4.1
  uuid: ^4.5.0
  fluttertoast: 9.0.0
  intl: ^0.19.0
  image_picker: ^1.1.2   # <-- THÊM DÒNG NÀY VÀO

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/